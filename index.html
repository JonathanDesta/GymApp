<style>
:root{color-scheme:light;
 --navy:#1f3864;--blue:#2e5496;--blue2:#3f6bb5;--ink:#1a1f29;--mut:#6b7280;
 --line:#e3e8f0;--bg:#f7f9fc;--card:#ffffff;--green:#0f9d58;--greenbg:#e6f4ea;
 --amber:#b45309;--red:#c0392b;--chip:#eef3fa;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
 color:var(--ink);background:var(--bg);font-size:15px;line-height:1.4}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 90px}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
h1{font-size:18px;margin:0;color:var(--navy);font-weight:800;letter-spacing:.2px}
.statline{font-size:12px;color:var(--mut);margin-top:2px}
.sync{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--chip);color:var(--mut);white-space:nowrap}
.sync.ok{background:var(--greenbg);color:var(--green)}
.sync.warn{background:#fdf0e6;color:var(--amber)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--blue);
 padding:8px 13px;border-radius:999px;font-weight:600;font-size:13.5px;cursor:pointer}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.daysub{font-size:12.5px;color:var(--mut);margin:0 2px 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:10px;box-shadow:0 1px 2px rgba(20,40,80,.04)}
.exhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exname{font-weight:700;font-size:15px}
.exnote{font-size:11.5px;color:var(--mut);margin-top:2px}
.badge{flex:0 0 auto;background:var(--chip);color:var(--blue);font-weight:700;font-size:12px;padding:3px 9px;border-radius:8px;white-space:nowrap}
.inputs{display:flex;gap:10px;align-items:flex-end;margin-top:10px;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10.5px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.fld input{width:78px;padding:9px 8px;border:1px solid var(--line);border-radius:9px;font-size:16px;text-align:center;font-weight:600;background:#fff}
.fld input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,84,150,.12)}
.last{font-size:11.5px;color:var(--mut);margin-left:auto;text-align:right;min-width:90px}
.cue{display:none;margin-top:9px;font-size:12px;font-weight:700;color:var(--green);background:var(--greenbg);
 padding:6px 10px;border-radius:8px}
.cue.show{display:block}
.reps-hit input{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.savebar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);
 border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;justify-content:center;backdrop-filter:blur(6px)}
.savebar .inner{max-width:720px;width:100%;display:flex;gap:10px;align-items:center}
.btn{border:none;border-radius:11px;padding:12px 16px;font-weight:700;font-size:14.5px;cursor:pointer}
.btn.primary{background:var(--navy);color:#fff;flex:1}
.btn.ghost{background:var(--chip);color:var(--blue)}
.btn:active{transform:translateY(1px)}
.datepick{padding:9px;border:1px solid var(--line);border-radius:9px;font-size:14px}
.muted{color:var(--mut);font-size:12.5px}
.kpis{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.kpi{flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.kpi .v{font-size:20px;font-weight:800;color:var(--navy)}
.kpi .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
th{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.addrow{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:6px}
.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#222b3a;color:#fff;
 padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
.refblock{font-size:13px;margin:4px 0 0}
.refblock b{color:var(--navy)}
.weekpick{display:flex;gap:6px;margin-bottom:10px}
.weekpick button{flex:1;border:1px solid var(--line);background:#fff;color:var(--blue);border-radius:9px;padding:8px;font-weight:600;cursor:pointer;font-size:13px}
.weekpick button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.hint{font-size:12px;color:var(--mut);margin:-2px 2px 10px}
.sesstimer{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin-bottom:10px}
.sesstimer .clock{font-size:22px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
.sesstimer .tgt{font-size:12px;color:var(--mut)}
.sesstimer.warnt .clock{color:var(--amber)}
.sesstimer.over .clock{color:var(--red)}
.btn.sm{padding:7px 12px;font-size:13px;flex:0 0 auto}
.sesstimer button{margin-left:auto}
.restbtn{margin-top:9px;background:var(--chip);color:var(--blue);border:none;border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer}
.restbtn:active{transform:translateY(1px)}
.restbar{position:fixed;left:50%;bottom:140px;transform:translateX(-50%);min-width:250px;background:#1f2a3a;color:#fff;border-radius:12px;padding:10px 14px;display:none;align-items:center;gap:12px;z-index:60;box-shadow:0 6px 22px rgba(0,0,0,.28)}
.restbar.show{display:flex}
.restbar .rc{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.restbar .rl{font-size:11.5px;opacity:.8;margin-top:2px}
.restbar.done{background:var(--green)}
.restbar button{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:6px 11px;font-weight:700;cursor:pointer;margin-left:auto}
</style>

<script>
// ─── Google Drive sync config ────────────────────────────────────────────
// Paste your OAuth Web client ID here after the Google Cloud setup (see SETUP.md).
// Safe to ship publicly: the drive.file scope only grants access to files this app creates.
const CLIENT_ID="170541815078-mvs58bbent5vb1cpdskhmr6pa3db8o5h.apps.googleusercontent.com";
const SCOPE="https://www.googleapis.com/auth/drive.file";
const FILENAME="liftdata.json";
const CACHE="liftdash_cache_v1";
const PStart="liftdash_start";
let accessToken=null;   // in-memory only — never persisted
let tokenClient=null;   // GIS token client
let fileId=null;        // cached Drive file id for in-place PATCH

// e:[name,sets,lo,hi,rest,note,defaultWt,kind]  kind: lift|nocue|cardio
const PROG={
 "Upper A":{sub:"Mon · Push-biased · ~79 min · +2.5–5 lb when reps hit top",targetMin:79,ex:[
  ["Flat barbell bench press",3,4,6,"3 min","Your core lift",225,"lift"],
  ["Weighted pull-up",3,6,8,"2–3 min","Added lb · neutral grip",15,"lift"],
  ["Cable lateral raise",5,12,15,"2 min","Priority · 10/wk",22,"lift"],
  ["Incline dumbbell press",3,8,10,"2 min","Upper chest · 30–45°",55,"lift"],
  ["Chest-supported row",3,8,10,"2 min","Mid-back thickness",160,"lift"],
  ["Overhead cable triceps ext",2,10,12,"75s","Long head · stretch",71.5,"lift"],
  ["Incline dumbbell curl",2,10,12,"75s","Lengthened position",35,"lift"],
  ["Reverse pec deck",3,12,15,"90s","Rear delts",70,"lift"],
  ["DB shrug",2,10,12,"90s","Traps · rebuild priority",230,"lift"]]},
 "Lower A":{sub:"Tue · Squat + power · jump primer + Zone 2 · +5–10 lb",targetMin:90,ex:[
  ["Box jump (primer)",3,3,3,"60s","Land soft · step down",0,"nocue"],
  ["Depth jump (primer)",3,4,4,"90s","12–18in box · explode up",0,"nocue"],
  ["Power clean",3,2,4,"5 min","Stop on bar-speed drop · no add cue",235,"nocue"],
  ["Hack squat",4,6,8,"3 min","Primary quad",335,"lift"],
  ["Romanian deadlift",3,8,10,"2–3 min","Hamstring + glute",315,"lift"],
  ["Seated leg curl",3,8,12,"90s","Direct hamstring",220,"lift"],
  ["Leg press calf raise",4,10,12,"75s","Heavier day · full stretch",745,"lift"],
  ["Hanging leg raise",3,10,15,"60s","Abs · add lb to progress",0,"lift"],
  ["Zone 2 cardio (min)",1,20,25,"—","Conversational pace",0,"cardio"]]},
 "Upper B":{sub:"Wed · Pull-biased · ~70 min · +2.5–5 lb when reps hit top",targetMin:70,ex:[
  ["Barbell overhead press",2,6,8,"3 min","Overhead pattern",135,"lift"],
  ["Lat pulldown",3,8,10,"2 min","Back width · neutral grip",165,"lift"],
  ["Cable lateral raise",5,12,15,"2 min","Priority · 2nd session",22,"lift"],
  ["Incline dumbbell press (20°)",3,8,10,"2 min","Upper chest · 2nd session",70,"lift"],
  ["Reverse pec deck",3,12,15,"90s","Rear delts",70,"lift"],
  ["DB shrug",3,10,12,"90s","Upper traps",220,"lift"],
  ["Hammer curl",2,10,12,"75s","Biceps + brachialis",35,"lift"],
  ["Rope triceps pushdown",3,12,15,"90s","Lateral head",38.5,"lift"]]},
 "Lower B":{sub:"Thu · Hypertrophy · the frequency fix · +Zone 2 · +5–10 lb",targetMin:74,ex:[
  ["Leg press",3,10,12,"2–3 min","2nd quad session",495,"lift"],
  ["Leg press calf raise",3,12,15,"75s","Lighter/higher-rep day",675,"lift"],
  ["Bulgarian split squat",2,8,10,"2 min","Per leg · single-leg power",145,"lift"],
  ["Romanian deadlift",2,8,10,"2 min","2nd hamstring session",315,"lift"],
  ["Seated leg curl",3,10,12,"90s","Direct hamstring",110,"lift"],
  ["Cable crunch",3,12,15,"60s","Upper-ab emphasis",66,"lift"],
  ["Zone 2 cardio (min)",1,20,25,"—","Cool-down finisher",0,"cardio"]]}
};
const ATHLETIC={sub:"Sunday · ~30 min · rotate A→B→C each week · log what you did",weeks:{
 "A — Speed":["Sprint accelerations: 6×25m @~90%, walk back (~75s)","5-10-5 shuttle: 5 reps, full rest","Sprint repeats: 6×60m @~80%, 95s walk"],
 "B — Lateral/Reactive":["Lateral skater bounds: 4×5/side, stick landings","Mirror/reaction shuffle: 4×12s","Shuttle conditioning: 6× 5-10-5, 95s rest"],
 "C — Power/Mixed":["Broad jumps: 4×3, max distance","Bounding: 4×20m, long strides","Tempo shuttle: 6× 5-10-5, 90s rest"]}};

let DATA={version:1,sessions:[],bodyweight:[],nutrition:[]};
let CUR="Upper A";
let DIRTY={}; // exName -> {wt,reps}

const $=s=>document.querySelector(s);
const todayISO=()=>new Date().toISOString().slice(0,10);
function setSync(t,cls){const e=$("#sync");e.textContent=t;e.className="sync"+(cls?" "+cls:"");}
function toast(t){const e=$("#toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2200);}
function fmtSec(s){const m=Math.floor(s/60);return m+":"+String(s%60).padStart(2,"0");}
function parseRest(str){if(!str||str==="—")return 0;let m=str.match(/(\d+)\s*s/);if(m)return +m[1];
 let r=str.match(/(\d+)(?:\s*[–-]\s*(\d+))?\s*min/);if(r)return (r[2]?+r[2]:+r[1])*60;return 0;}
function beep(){try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();
 o.connect(g);g.connect(a.destination);o.type="sine";o.frequency.value=880;
 g.gain.setValueAtTime(.0001,a.currentTime);g.gain.exponentialRampToValueAtTime(.35,a.currentTime+.02);
 g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.7);o.start();o.stop(a.currentTime+.72);}catch(e){}
 if(navigator.vibrate)navigator.vibrate([250,80,250]);}
let restInt=null,restEnd=0;
function startRest(sec,label){clearInterval(restInt);restEnd=Date.now()+sec*1000;
 const bar=document.getElementById("restbar");bar.classList.remove("done");bar.classList.add("show");
 document.getElementById("rl").textContent=label+" · rest";tickRest();restInt=setInterval(tickRest,250);}
function tickRest(){let left=Math.round((restEnd-Date.now())/1000);
 if(left<=0){document.getElementById("rc").textContent="0:00";const b=document.getElementById("restbar");
  b.classList.add("done");document.getElementById("rl").textContent="Rest done — next set";clearInterval(restInt);beep();
  setTimeout(()=>b.classList.remove("show"),4000);return;}
 document.getElementById("rc").textContent=fmtSec(left);}
let sessInt=null;
function startWorkout(){localStorage.setItem("workout_start",Date.now());renderSessTimer();}
function resetWorkout(){localStorage.removeItem("workout_start");renderSessTimer();}
function renderSessTimer(){const el=document.getElementById("sesstimer");if(!el){clearInterval(sessInt);return;}
 const st=localStorage.getItem("workout_start");const day=PROG[CUR];const tgt=(day&&day.targetMin)||0;
 clearInterval(sessInt);
 if(!st){el.className="sesstimer";el.innerHTML=`<div class="clock">0:00</div><div class="tgt">target ~${tgt} min</div><button class="btn primary sm" id="startw">Start workout</button>`;
  document.getElementById("startw").onclick=startWorkout;return;}
 el.innerHTML=`<div class="clock">0:00</div><div class="tgt">/ ~${tgt} min</div><button class="btn ghost sm" id="resetw">Reset</button>`;
 document.getElementById("resetw").onclick=resetWorkout;
 function paint(){const ms=Date.now()-(+st);const t=Math.floor(ms/1000);const mins=ms/60000;
  el.querySelector(".clock").textContent=Math.floor(t/60)+":"+String(t%60).padStart(2,"0");
  el.classList.toggle("warnt",tgt&&mins>=tgt*0.9&&mins<tgt);el.classList.toggle("over",tgt&&mins>=tgt);}
 paint();sessInt=setInterval(paint,1000);}

// ─── Google Identity Services token client ───────────────────────────────
function gisAvailable(){return !!(window.google&&google.accounts&&google.accounts.oauth2);}
function initTokenClient(){
 if(tokenClient||!gisAvailable())return tokenClient;
 tokenClient=google.accounts.oauth2.initTokenClient({
  client_id:CLIENT_ID,
  scope:SCOPE,
  callback:(resp)=>{
   if(resp&&resp.access_token){accessToken=resp.access_token;onConnected();}
   else{setSync("connect Drive","warn");}
  },
  error_callback:(err)=>{
   // Silent (prompt:'') reuse failed → show the consent screen on this gesture.
   if(err&&(err.type==="popup_failed_to_open"||err.type==="popup_closed")){
    setSync("connect Drive","warn");toast("Sign-in cancelled");
   }else{setSync("connect Drive","warn");}
  }
 });
 return tokenClient;
}
// Connect button — must be called from a user gesture (iOS Safari blocks non-gesture popups).
function connectDrive(){
 if(!CLIENT_ID||CLIENT_ID.indexOf("PASTE_YOUR_CLIENT_ID")===0){
  toast("Set CLIENT_ID in index.html (see SETUP.md)");return;}
 if(!initTokenClient()){toast("Google library still loading — try again");return;}
 setSync("connecting…");
 // prompt:'' attempts silent reuse of an existing grant; GIS falls back to consent itself.
 tokenClient.requestAccessToken({prompt: accessToken?"":"consent"});
}
// After a token arrives: locate the file, pull remote, reconcile, push if local is newer.
async function onConnected(){
 setSync("syncing…");
 try{
  await findFile();
  const remote=await loadDrive();
  if(remote){reconcile(remote);}
  else{await saveDrive();} // no file yet → create from current DATA
  setSync("synced ✓","ok");
  render();
 }catch(e){
  setSync("offline · using device","warn");
 }
}
// Last-write-wins on the `updated` timestamp; never silently drop local edits.
function reconcile(remote){
 const localU=DATA.updated?Date.parse(DATA.updated):0;
 const remoteU=remote.updated?Date.parse(remote.updated):0;
 if(remoteU>=localU){
  DATA=remote;localStorage.setItem(CACHE,JSON.stringify(DATA));
 }else{
  saveDrive().catch(()=>{}); // local is newer — push it up
 }
}
// GET the single liftdata.json (drive.file scope only sees files we created). Caches fileId.
async function findFile(){
 const q="name='"+FILENAME+"' and trashed=false";
 const url="https://www.googleapis.com/drive/v3/files?q="+encodeURIComponent(q)+
  "&spaces=drive&fields=files(id,modifiedTime)";
 const r=await fetch(url,{headers:{Authorization:"Bearer "+accessToken}});
 if(r.status===401){accessToken=null;throw new Error("token expired");}
 if(!r.ok)throw new Error("find "+r.status);
 const j=await r.json();
 fileId=(j.files&&j.files.length)?j.files[0].id:null;
 return fileId;
}
async function loadDrive(){
 if(!accessToken)throw new Error("no token");
 if(fileId===null)await findFile();
 if(!fileId)return null;
 const r=await fetch("https://www.googleapis.com/drive/v3/files/"+fileId+"?alt=media",
  {headers:{Authorization:"Bearer "+accessToken}});
 if(r.status===401){accessToken=null;throw new Error("token expired");}
 if(!r.ok)throw new Error("load "+r.status);
 return await r.json();
}
async function saveDrive(){
 DATA.updated=new Date().toISOString();
 localStorage.setItem(CACHE,JSON.stringify(DATA)); // device-first: instant, never lost
 if(!accessToken)throw new Error("no token");
 const body=JSON.stringify(DATA);
 if(!fileId){
  // First save: multipart create, then remember the id forever.
  const boundary="lift_"+Date.now();
  const multipart=
   "--"+boundary+"\r\n"+
   "Content-Type: application/json; charset=UTF-8\r\n\r\n"+
   JSON.stringify({name:FILENAME})+"\r\n"+
   "--"+boundary+"\r\n"+
   "Content-Type: application/json; charset=UTF-8\r\n\r\n"+
   body+"\r\n"+
   "--"+boundary+"--";
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{
   method:"POST",
   headers:{Authorization:"Bearer "+accessToken,
    "Content-Type":"multipart/related; boundary="+boundary},
   body:multipart});
  if(r.status===401){accessToken=null;throw new Error("token expired");}
  if(!r.ok)throw new Error("create "+r.status);
  const j=await r.json();fileId=j.id;
 }else{
  // Every later save: in-place PATCH of the same file — one file, no duplicates ever.
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files/"+fileId+"?uploadType=media",{
   method:"PATCH",
   headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json; charset=UTF-8"},
   body:body});
  if(r.status===401){accessToken=null;throw new Error("token expired");}
  if(!r.ok)throw new Error("save "+r.status);
 }
}

function programWeek(){
 const s=localStorage.getItem(PStart);if(!s)return null;
 const d=Math.floor((Date.now()-new Date(s+"T00:00:00"))/864e5);
 return {wk:Math.floor(d/7)+1,deload:7-((Math.floor(d/7))%7)};
}
function lastEntry(day,name){
 const ss=DATA.sessions.filter(x=>x.day===day&&x.entries.some(e=>e.name===name))
   .sort((a,b)=>b.date.localeCompare(a.date));
 if(!ss.length)return null;
 const e=ss[0].entries.find(e=>e.name===name);
 return {wt:e.wt,reps:e.reps,date:ss[0].date};
}

function renderTabs(){
 const t=$("#tabs");t.innerHTML="";
 [...Object.keys(PROG),"Athletic","Bodyweight"].forEach(name=>{
  const b=document.createElement("button");
  b.className="tab"+(name===CUR?" active":"");
  b.textContent=name;b.onclick=()=>{CUR=name;DIRTY={};render();};
  t.appendChild(b);
 });
}
function render(){
 renderTabs();
 const v=$("#view");
 const pw=programWeek();
 $("#statline").innerHTML=pw?`Week <b>${pw.wk}</b> · deload in ${pw.deload} wk${pw.deload!==1?"s":""}`
   :`<a href="#" id="setstart" style="color:var(--blue)">Set program start date →</a>`;
 if(!pw){setTimeout(()=>{const a=$("#setstart");if(a)a.onclick=ev=>{ev.preventDefault();
   const d=prompt("Program start date (YYYY-MM-DD):",todayISO());if(d){localStorage.setItem(PStart,d);render();}};},0);}
 if(CUR==="Bodyweight"){v.innerHTML=bodyView();$("#savebar").style.display="none";setTimeout(drawChart,30);bindBW();return;}
 if(CUR==="Athletic"){v.innerHTML=athleticView();$("#savebar").style.display="none";bindAth();return;}
 // training day
 const day=PROG[CUR];
 let h=`<div class="sesstimer" id="sesstimer"></div><div class="daysub">${day.sub}</div>`;
 day.ex.forEach((e,i)=>{
  const[name,sets,lo,hi,rest,note,dw,kind]=e;
  const le=lastEntry(CUR,name);
  const wtVal=(DIRTY[name]&&DIRTY[name].wt!=null)?DIRTY[name].wt:(le?le.wt:(dw||""));
  const repsVal=(DIRTY[name]&&DIRTY[name].reps!=null)?DIRTY[name].reps:"";
  const tgt=lo===hi?`${sets}×${lo}`:`${sets}×${lo}–${hi}`;
  const lasttxt=le?`last: ${le.wt||"–"}${le.reps?"×"+le.reps:""}<br><span class="muted">${le.date}</span>`:`<span class="muted">no history</span>`;
  const unit=kind==="cardio"?"min":"lb";
  const restSec=parseRest(rest);
  h+=`<div class="card" data-ex="${i}">
    <div class="exhead"><div><div class="exname">${name}</div><div class="exnote">${note} · rest ${rest}</div></div>
      <span class="badge">${tgt}${kind==="cardio"?" min":""}</span></div>
    <div class="inputs">
      <div class="fld"><label>${unit}</label><input type="number" inputmode="decimal" data-k="wt" data-name="${name}" data-kind="${kind}" data-hi="${hi}" value="${wtVal}"></div>
      <div class="fld reps-fld"><label>reps</label><input type="number" inputmode="numeric" data-k="reps" data-name="${name}" data-kind="${kind}" data-hi="${hi}" value="${repsVal}"></div>
      <div class="last">${lasttxt}</div>
    </div>
    <div class="cue" data-cue="${name}">✓ Hit the top — add weight next session</div>
    ${restSec?`<button class="restbtn" data-rest="${restSec}" data-name="${name}">⏱ Rest ${fmtSec(restSec)}</button>`:""}
   </div>`;
 });
 v.innerHTML=h;
 $("#savebar").style.display="flex";
 $("#sessdate").value=todayISO();
 v.querySelectorAll("input").forEach(inp=>{
  inp.addEventListener("input",onInput);
 });
 // initial cue paint
 v.querySelectorAll('input[data-k="reps"]').forEach(paintCue);
 v.querySelectorAll(".restbtn").forEach(b=>b.onclick=()=>startRest(+b.dataset.rest,b.dataset.name));
 renderSessTimer();
}
function onInput(ev){
 const inp=ev.target,name=inp.dataset.name,k=inp.dataset.k;
 DIRTY[name]=DIRTY[name]||{};
 DIRTY[name][k]=inp.value===""?null:parseFloat(inp.value);
 if(k==="reps")paintCue(inp);
}
function paintCue(inp){
 const card=inp.closest(".card");const kind=inp.dataset.kind;const hi=parseFloat(inp.dataset.hi);
 const cue=card.querySelector(".cue");const fld=card.querySelector(".reps-fld");
 const v=parseFloat(inp.value);
 const hit=kind==="lift"&&!isNaN(v)&&v>=hi;
 cue.classList.toggle("show",hit);
 fld.classList.toggle("reps-hit",hit);
}
function saveSession(){
 const day=PROG[CUR];const date=$("#sessdate").value||todayISO();
 const entries=[];
 day.ex.forEach(e=>{
  const name=e[0];const d=DIRTY[name];
  if(d&&(d.wt!=null||d.reps!=null))entries.push({name,wt:d.wt??null,reps:d.reps??null});
 });
 if(!entries.length){toast("Nothing to save yet");return;}
 DATA.sessions.push({date,day:CUR,entries});
 localStorage.removeItem("workout_start");
 persist("Session saved");
}
function persist(okmsg){
 localStorage.setItem(CACHE,JSON.stringify(DATA));
 setSync("syncing…");
 saveDrive().then(()=>{setSync("synced ✓","ok");toast(okmsg+" & synced");DIRTY={};render();})
  .catch(()=>{setSync("saved on device","warn");toast(okmsg+" locally · sync retry next save");});
}

// Bodyweight
function bodyView(){
 const bw=[...DATA.bodyweight].sort((a,b)=>a.date.localeCompare(b.date));
 const last7=bw.slice(-7);
 const avg=last7.length?(last7.reduce((s,x)=>s+x.lb,0)/last7.length):null;
 const latest=bw.length?bw[bw.length-1].lb:null;
 let rows=bw.slice().reverse().slice(0,30).map(x=>`<tr><td>${x.date}</td><td>${x.lb.toFixed(1)}</td></tr>`).join("");
 return `<div class="kpis">
   <div class="kpi"><div class="v">${latest?latest.toFixed(1):"–"}</div><div class="l">Latest lb</div></div>
   <div class="kpi"><div class="v">${avg?avg.toFixed(1):"–"}</div><div class="l">7-day avg</div></div>
   <div class="kpi"><div class="v">${bw.length}</div><div class="l">Entries</div></div></div>
  <div class="card"><div style="height:200px"><canvas id="bwchart"></canvas></div></div>
  <div class="card"><div class="addrow">
    <div class="fld"><label>date</label><input type="date" id="bwdate" class="datepick" value="${todayISO()}"></div>
    <div class="fld"><label>weight (lb)</label><input type="number" inputmode="decimal" id="bwval" style="width:90px;padding:9px;border:1px solid var(--line);border-radius:9px;font-size:16px;text-align:center"></div>
    <button class="btn primary" id="bwadd" style="flex:0 0 auto">Add ▸ sync</button>
   </div></div>
  <div class="card"><table><tr><th>Date</th><th>Weight</th></tr>${rows||'<tr><td colspan=2 class=muted>No entries yet</td></tr>'}</table></div>`;
}
let chart;
function drawChart(){
 const c=document.getElementById("bwchart");if(!c)return;
 const bw=[...DATA.bodyweight].sort((a,b)=>a.date.localeCompare(b.date));
 if(chart)chart.destroy();
 chart=new Chart(c,{type:"line",data:{labels:bw.map(x=>x.date),
   datasets:[{label:"Bodyweight",data:bw.map(x=>x.lb),borderColor:"#2e5496",backgroundColor:"rgba(46,84,150,.1)",
   tension:.3,fill:true,pointRadius:2}]},
   options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
   scales:{y:{ticks:{color:"#6b7280"}},x:{ticks:{color:"#6b7280",maxTicksLimit:6}}}}});
}
function bindBW(){
 const b=$("#bwadd");if(!b)return;
 b.onclick=()=>{const d=$("#bwdate").value,v=parseFloat($("#bwval").value);
  if(!d||isNaN(v)){toast("Enter a weight");return;}
  DATA.bodyweight=DATA.bodyweight.filter(x=>x.date!==d);
  DATA.bodyweight.push({date:d,lb:v});
  persist("Bodyweight added");};
}
function athleticView(){
 let h=`<div class="daysub">${ATHLETIC.sub}</div>`;
 h+=`<div class="hint">Pick this week's variant, do the 3 blocks, then jot a note. Jump primer (box + depth jumps) lives on your Lower A day.</div>`;
 const sel=localStorage.getItem("ath_week")||"A — Speed";
 h+=`<div class="weekpick">`;
 Object.keys(ATHLETIC.weeks).forEach(k=>{h+=`<button data-w="${k}" class="${k===sel?'on':''}">${k.split(" ")[0]}</button>`;});
 h+=`</div><div class="card">`;
 ATHLETIC.weeks[sel].forEach((b,i)=>{h+=`<div class="refblock"><b>Block ${i+1}.</b> ${b}</div>`;});
 h+=`</div>
  <div class="card"><div class="addrow">
   <div class="fld"><label>date</label><input type="date" id="athdate" class="datepick" value="${todayISO()}"></div>
   <div class="fld" style="flex:1"><label>note (optional)</label><input id="athnote" placeholder="felt good / sprints @95% / best broad jump 9'2&quot;" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:9px;font-size:15px"></div>
   <button class="btn primary" id="athsave" style="flex:0 0 auto">Log ▸ sync</button>
  </div></div>`;
 const past=DATA.sessions.filter(s=>s.day==="Athletic").slice(-8).reverse();
 if(past.length){h+=`<div class="card"><table><tr><th>Date</th><th>Variant</th><th>Note</th></tr>`+
   past.map(s=>`<tr><td>${s.date}</td><td>${s.variant||""}</td><td>${(s.entries[0]&&s.entries[0].note)||""}</td></tr>`).join("")+`</table></div>`;}
 return h;
}
function bindAth(){
 document.querySelectorAll(".weekpick button").forEach(b=>b.onclick=()=>{localStorage.setItem("ath_week",b.dataset.w);render();});
 const s=$("#athsave");if(s)s.onclick=()=>{const d=$("#athdate").value,n=$("#athnote").value;
  DATA.sessions.push({date:d,day:"Athletic",variant:localStorage.getItem("ath_week")||"A — Speed",entries:[{name:"Athletic session",note:n}]});
  persist("Athletic session logged");};
}

$("#savebtn").onclick=saveSession;
$("#clearbtn").onclick=()=>{DIRTY={};render();toast("Cleared inputs");};

// The #sync chip doubles as the "Connect Google Drive" button (gesture-triggered).
$("#sync").style.cursor="pointer";
$("#sync").title="Tap to connect / sync Google Drive";
$("#sync").onclick=connectDrive;

(function init(){
 const cached=localStorage.getItem(CACHE);
 if(cached){try{DATA=JSON.parse(cached);}catch(e){}}
 render();
 // Never auto-invoke OAuth on load (iOS Safari blocks non-gesture popups).
 setSync("connect Drive","warn");
 // Pre-init the token client once GIS finishes loading so the first tap is instant.
 let tries=0;
 const t=setInterval(()=>{
  if(gisAvailable()){initTokenClient();clearInterval(t);}
  else if(++tries>40)clearInterval(t); // ~10s give-up; tap will retry
 },250);
})();

// Service worker: network-first index.html so deploys propagate without reinstall.
if("serviceWorker" in navigator){
 window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});
}
</script>
