<style>
:root{color-scheme:light;
 --navy:#1f3864;--blue:#2e5496;--blue2:#3f6bb5;--ink:#1a1f29;--mut:#6b7280;
 --line:#e3e8f0;--bg:#f7f9fc;--card:#ffffff;--green:#0f9d58;--greenbg:#e6f4ea;
 --amber:#b45309;--red:#c0392b;--chip:#eef3fa;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
 color:var(--ink);background:var(--bg);font-size:15px;line-height:1.4}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 90px}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
h1{font-size:18px;margin:0;color:var(--navy);font-weight:800;letter-spacing:.2px}
.statline{font-size:12px;color:var(--mut);margin-top:2px}
.sync{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--chip);color:var(--mut);white-space:nowrap}
.sync.ok{background:var(--greenbg);color:var(--green)}
.sync.warn{background:#fdf0e6;color:var(--amber)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--blue);
 padding:8px 13px;border-radius:999px;font-weight:600;font-size:13.5px;cursor:pointer}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.daysub{font-size:12.5px;color:var(--mut);margin:0 2px 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:10px;box-shadow:0 1px 2px rgba(20,40,80,.04)}
.exhead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exname{font-weight:700;font-size:15px}
.exnote{font-size:11.5px;color:var(--mut);margin-top:2px}
.badge{flex:0 0 auto;background:var(--chip);color:var(--blue);font-weight:700;font-size:12px;padding:3px 9px;border-radius:8px;white-space:nowrap}
.inputs{display:flex;gap:10px;align-items:flex-end;margin-top:10px;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10.5px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.fld input{width:78px;padding:9px 8px;border:1px solid var(--line);border-radius:9px;font-size:16px;text-align:center;font-weight:600;background:#fff}
.fld input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,84,150,.12)}
.last{font-size:11.5px;color:var(--mut);margin-left:auto;text-align:right;min-width:90px}
.cue{display:none;margin-top:9px;font-size:12px;font-weight:700;color:var(--green);background:var(--greenbg);
 padding:6px 10px;border-radius:8px}
.cue.show{display:block}
.reps-hit input{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.savebar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);
 border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;justify-content:center;backdrop-filter:blur(6px)}
.savebar .inner{max-width:720px;width:100%;display:flex;gap:10px;align-items:center}
.btn{border:none;border-radius:11px;padding:12px 16px;font-weight:700;font-size:14.5px;cursor:pointer}
.btn.primary{background:var(--navy);color:#fff;flex:1}
.btn.ghost{background:var(--chip);color:var(--blue)}
.btn:active{transform:translateY(1px)}
.datepick{padding:9px;border:1px solid var(--line);border-radius:9px;font-size:14px}
.muted{color:var(--mut);font-size:12.5px}
.kpis{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.kpi{flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.kpi .v{font-size:20px;font-weight:800;color:var(--navy)}
.kpi .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
th{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.addrow{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:6px}
.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#222b3a;color:#fff;
 padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
.refblock{font-size:13px;margin:4px 0 0}
.refblock b{color:var(--navy)}
.weekpick{display:flex;gap:6px;margin-bottom:10px}
.weekpick button{flex:1;border:1px solid var(--line);background:#fff;color:var(--blue);border-radius:9px;padding:8px;font-weight:600;cursor:pointer;font-size:13px}
.weekpick button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.hint{font-size:12px;color:var(--mut);margin:-2px 2px 10px}
.sesstimer{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin-bottom:10px}
.sesstimer .clock{font-size:22px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
.sesstimer .tgt{font-size:12px;color:var(--mut)}
.sesstimer.warnt .clock{color:var(--amber)}
.sesstimer.over .clock{color:var(--red)}
.btn.sm{padding:7px 12px;font-size:13px;flex:0 0 auto}
.sesstimer button{margin-left:auto}
.restbtn{margin-top:9px;background:var(--chip);color:var(--blue);border:none;border-radius:9px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer}
.restbtn:active{transform:translateY(1px)}
.restbar{position:fixed;left:50%;bottom:140px;transform:translateX(-50%);min-width:250px;background:#1f2a3a;color:#fff;border-radius:12px;padding:10px 14px;display:none;align-items:center;gap:12px;z-index:60;box-shadow:0 6px 22px rgba(0,0,0,.28)}
.restbar.show{display:flex}
.restbar .rc{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.restbar .rl{font-size:11.5px;opacity:.8;margin-top:2px}
.restbar.done{background:var(--green)}
.restbar button{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:6px 11px;font-weight:700;cursor:pointer;margin-left:auto}
/* ── Morning Routine module ── */
.mstep{display:flex;justify-content:space-between;gap:10px;padding:6px 2px;border-bottom:1px solid var(--line);font-size:14px}
.mstep:last-child{border-bottom:none}
.mstep-t{color:var(--mut);font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.mstep-d{font-size:11px;color:var(--mut);margin-top:2px;line-height:1.3;font-weight:400}
.tagp{background:#eef3fa;color:var(--blue);font-size:10px;padding:1px 6px;border-radius:6px;font-weight:700}
.tagc{background:#e6f0ff;color:#1d4ed8;font-size:10px;padding:1px 6px;border-radius:6px;font-weight:700}
.mstart{display:flex}.mstart .btn{flex:1}
.mclock-card{background:var(--navy);color:#fff;border-radius:14px;padding:14px;margin-bottom:10px}
.mclock-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mclock{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.mclock-sub{font-size:12px;opacity:.82;margin-top:2px}
.mpace{font-size:13px;font-weight:700;padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.16);white-space:nowrap}
.mpace.ahead{background:var(--green);color:#fff}
.mpace.behind{background:var(--red);color:#fff}
.mclock-card .restbtn{background:rgba(255,255,255,.16);color:#fff}
.mstep-active{text-align:center}
.mstep-name{font-size:20px;font-weight:800;color:var(--navy);margin:4px 0}
.mstep-clock{font-size:46px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--navy);line-height:1.1}
.mstep-clock.over{color:var(--red)}
.mstep-clock.soft{color:var(--blue)}
.mstep-target{font-size:12px;color:var(--mut);margin-bottom:8px}
.mstep-detail{font-size:12.5px;color:#5a6b80;background:var(--chip);border-radius:8px;padding:7px 10px;margin:2px 0 10px;line-height:1.4;text-align:left}
.subtimer{margin:10px 0;padding:10px;border:1px dashed var(--line);border-radius:10px}
.subtimer.cold{border-color:#1d4ed8;background:#f0f6ff}
.sub-stages{font-size:13px;color:var(--mut);margin-bottom:6px}
.mbtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.mbtns .btn{flex:1;min-width:120px}
.mnext{font-size:13px}
.mprog{display:flex;flex-direction:column;gap:4px}
.mprogrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0}
.mprogrow.done{color:var(--mut)}
.mprogrow.skipped{color:var(--mut);text-decoration:line-through}
.mprogrow.active{font-weight:700;color:var(--navy)}
.mpi{width:16px;text-align:center;font-weight:800}
.edstep{border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:8px}
.ed-name{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-weight:600}
.edrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--mut)}
.edrow input{padding:6px;border:1px solid var(--line);border-radius:7px;font-size:13px}
.edchk{display:flex;align-items:center;gap:4px}
.bgbar{position:fixed;left:50%;bottom:200px;transform:translateX(-50%);min-width:240px;max-width:90vw;background:#1f2a3a;color:#fff;border-radius:12px;padding:8px 10px;display:none;flex-direction:column;gap:6px;z-index:55;box-shadow:0 6px 22px rgba(0,0,0,.28)}
.bgbar.show{display:flex}
.bgrow{display:flex;align-items:center;gap:10px}
.bgrow .bgc{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;min-width:48px}
.bgrow .bgl{font-size:12px;opacity:.88}
.bgrow.done{color:#bff5cf}
.bgrow .bgx{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:7px;padding:3px 9px;font-weight:700;cursor:pointer;margin-left:auto}
/* ── Lift day: warm-up + per-set logging ── */
.warmup{background:#fff8ec;border-color:#f0e0c0}
.wu-h{font-weight:800;color:var(--amber);font-size:13px;margin-bottom:5px}
.wu-l{font-size:12px;color:#6b5a3a;margin:3px 0;line-height:1.35}
.exmeta{font-size:11.5px;color:var(--blue);font-weight:700;margin-top:3px}
.setgrid{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.setrow{display:grid;grid-template-columns:46px 1fr 1fr 74px;gap:8px;align-items:center}
.setrow.sethdr{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.setrow.sethdr span{text-align:center}
.setrow.sethdr .setlbl,.setrow.sethdr .setlast{text-align:left}
.setlbl{font-size:12px;font-weight:700;color:var(--blue)}
.setrow input{width:100%;padding:9px 6px;border:1px solid var(--line);border-radius:9px;font-size:16px;text-align:center;font-weight:600;background:#fff}
.setrow input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,84,150,.12)}
.setrow input.rep-hit{border-color:var(--green);background:var(--greenbg);color:var(--green)}
.setlast{font-size:11.5px;color:var(--mut);text-align:right}
</style>
<div class="wrap">
 <header>
  <div>
   <h1>Routines</h1>
   <div class="statline" id="statline">Loading…</div>
  </div>

 </header>
 <div class="tabs" id="tabs"></div>
 <div id="view"></div>
</div>
<div class="savebar" id="savebar" style="display:none">
 <div class="inner">
  <input type="date" id="sessdate" class="datepick">
  <button class="btn ghost" id="clearbtn">Clear</button>
  <button class="btn primary" id="savebtn">Save session ▸ sync</button>
 </div>
</div>
<div class="toast" id="toast"></div>
<div class="restbar" id="restbar"><div><div class="rc" id="rc">0:00</div><div class="rl" id="rl">rest</div></div><button id="restskip">Skip</button></div>
<div class="bgbar" id="bgbar"></div>

// Warm-up shown on every lift day (Lower A adds the power-clean ramp note inline).

 {id:"shower2mon",name:"Shower 2 — rinse masque + 3:00 cold",targetSec:300,days:["Mon"],cold:true,coldSec:180,detail:"Rinse masque out fully, then 3:00 cold (face already cleansed in Shower 1)."},
 {id:"shower2thu",name:"Shower 2 — rinse masque + facial cleanse + 3:00 cold",targetSec:360,days:["Thu"],cold:true,coldSec:180,detail:"Rinse masque out fully, cleanse face, then 3:00 cold."},
 {id:"leavein",name:"Leave-in conditioner — comb through",targetSec:90,days:["Mon","Thu"],detail:"1 palmful, rubbed between palms, raked through, then combed."},

// ── Alarm / wake-lock / notify (built for iOS limits) ───────────────────────
// iOS has NO web vibration API and freezes timers when backgrounded. The reliable
// path is: a generated sound played via an <audio> element (the MEDIA channel, which
// sounds even when the ring/silent switch is on), unlocked on the first tap, plus a
// Screen Wake Lock so the screen never sleeps mid-timer and the alarm actually fires.
let alarmEl=null,audioUnlocked=false,audioCtx=null,wakeLock=null,askedNotif=false;
function makeAlarmURI(){
 const sr=8000,dur=2.0,n=Math.floor(sr*dur),buf=new ArrayBuffer(44+n*2),dv=new DataView(buf);
 const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
 ws(0,"RIFF");dv.setUint32(4,36+n*2,true);ws(8,"WAVE");ws(12,"fmt ");dv.setUint32(16,16,true);
 dv.setUint16(20,1,true);dv.setUint16(22,1,true);dv.setUint32(24,sr,true);dv.setUint32(28,sr*2,true);
 dv.setUint16(32,2,true);dv.setUint16(34,16,true);ws(36,"data");dv.setUint32(40,n*2,true);
 for(let i=0;i<n;i++){const t=i/sr,k=Math.floor(t/0.32),lt=t-k*0.32;let s=0;
  if(lt<0.2&&k<6){const f=k%2?988:784,env=Math.min(1,lt/0.008)*Math.min(1,(0.2-lt)/0.02);s=Math.sin(2*Math.PI*f*t)*0.75*env;}
  dv.setInt16(44+i*2,Math.max(-1,Math.min(1,s))*32767,true);}
 let bin="",by=new Uint8Array(buf);for(let i=0;i<by.length;i++)bin+=String.fromCharCode(by[i]);
 return "data:audio/wav;base64,"+btoa(bin);
}
function initAlarm(){if(!alarmEl){alarmEl=new Audio();alarmEl.src=makeAlarmURI();alarmEl.preload="auto";}}
function unlockAudio(){ // must run inside a user gesture; muted play satisfies iOS, later plays are audible
 initAlarm();if(audioUnlocked)return;alarmEl.muted=true;
 const p=alarmEl.play();const done=()=>{try{alarmEl.pause();alarmEl.currentTime=0;}catch(e){}alarmEl.muted=false;audioUnlocked=true;};
 if(p&&p.then)p.then(done).catch(()=>{alarmEl.muted=false;});else done();
 try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();}catch(e){}
}

function beep(msg){
 // primary: media-channel alarm (audible on silent mode, screen on)
 try{initAlarm();alarmEl.muted=false;alarmEl.currentTime=0;const p=alarmEl.play();if(p&&p.catch)p.catch(()=>{});}catch(e){}
 // fallback: Web Audio tone (nudges the audio subsystem; obeys the mute switch)
 try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type="sine";o.frequency.value=880;
  g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.4,audioCtx.currentTime+.02);

 if(navigator.vibrate)navigator.vibrate([300,120,300,120,300]); // Android only; no-op on iOS

function gisAvailable(){return !!(window.google&&google.accounts&&google.accounts.oauth2);}
function initTokenClient(){
 if(tokenClient||!gisAvailable())return tokenClient;
 tokenClient=google.accounts.oauth2.initTokenClient({
  client_id:CLIENT_ID,
  scope:SCOPE,
  callback:(resp)=>{
   if(resp&&resp.access_token){accessToken=resp.access_token;onConnected();}
   else{setSync("connect Drive","warn");}
  },
  error_callback:(err)=>{
   // Silent (prompt:'') reuse failed → show the consent screen on this gesture.
   if(err&&(err.type==="popup_failed_to_open"||err.type==="popup_closed")){
    setSync("connect Drive","warn");toast("Sign-in cancelled");
   }else{setSync("connect Drive","warn");}
  }
 });

// Connect button — must be called from a user gesture (iOS Safari blocks non-gesture popups).
function connectDrive(){
 if(!CLIENT_ID||CLIENT_ID.indexOf("PASTE_YOUR_CLIENT_ID")===0){
  toast("Set CLIENT_ID in index.html (see SETUP.md)");return;}
 if(!initTokenClient()){toast("Google library still loading — try again");return;}

 // prompt:'' attempts silent reuse of an existing grant; GIS falls back to consent itself.

// After a token arrives: locate the file, pull remote, reconcile, push if local is newer.
async function onConnected(){
 setSync("syncing…");
 try{
  await findFile();
  const remote=await loadDrive();
  if(remote){reconcile(remote);}
  else{await saveDrive();} // no file yet → create from current DATA
  setSync("synced ✓","ok");
  render();
 }catch(e){
  setSync("offline · using device","warn");
 }
}
// Last-write-wins on the `updated` timestamp; never silently drop local edits.
function reconcile(remote){
 const localU=DATA.updated?Date.parse(DATA.updated):0;
 const remoteU=remote.updated?Date.parse(remote.updated):0;
 if(remoteU>=localU){
  DATA=remote;localStorage.setItem(CACHE,JSON.stringify(DATA));
 }else{
  saveDrive().catch(()=>{}); // local is newer — push it up
 }
}
// GET the single liftdata.json (drive.file scope only sees files we created). Caches fileId.
async function findFile(){
 const q="name='"+FILENAME+"' and trashed=false";
 const url="https://www.googleapis.com/drive/v3/files?q="+encodeURIComponent(q)+
  "&spaces=drive&fields=files(id,modifiedTime)";
 const r=await fetch(url,{headers:{Authorization:"Bearer "+accessToken}});
 if(r.status===401){accessToken=null;throw new Error("token expired");}
 if(!r.ok)throw new Error("find "+r.status);
 const j=await r.json();
 fileId=(j.files&&j.files.length)?j.files[0].id:null;
 return fileId;
}
async function loadDrive(){
 if(!accessToken)throw new Error("no token");
 if(fileId===null)await findFile();
 if(!fileId)return null;
 const r=await fetch("https://www.googleapis.com/drive/v3/files/"+fileId+"?alt=media",
  {headers:{Authorization:"Bearer "+accessToken}});
 if(r.status===401){accessToken=null;throw new Error("token expired");}
 if(!r.ok)throw new Error("load "+r.status);
 return await r.json();
}
async function saveDrive(){
 DATA.updated=new Date().toISOString();
 localStorage.setItem(CACHE,JSON.stringify(DATA)); // device-first: instant, never lost
 if(!accessToken)throw new Error("no token");
 const body=JSON.stringify(DATA);
 if(!fileId){
  // First save: multipart create, then remember the id forever.
  const boundary="lift_"+Date.now();
  const multipart=
   "--"+boundary+"\r\n"+
   "Content-Type: application/json; charset=UTF-8\r\n\r\n"+
   JSON.stringify({name:FILENAME})+"\r\n"+
   "--"+boundary+"\r\n"+
   "Content-Type: application/json; charset=UTF-8\r\n\r\n"+
   body+"\r\n"+
   "--"+boundary+"--";
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{
   method:"POST",
   headers:{Authorization:"Bearer "+accessToken,
    "Content-Type":"multipart/related; boundary="+boundary},
   body:multipart});
  if(r.status===401){accessToken=null;throw new Error("token expired");}
  if(!r.ok)throw new Error("create "+r.status);
  const j=await r.json();fileId=j.id;
 }else{
  // Every later save: in-place PATCH of the same file — one file, no duplicates ever.
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files/"+fileId+"?uploadType=media",{
   method:"PATCH",
   headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json; charset=UTF-8"},
   body:body});
  if(r.status===401){accessToken=null;throw new Error("token expired");}
  if(!r.ok)throw new Error("save "+r.status);
 }
}

 DIRTY[name]=DIRTY[name]||[];
 DIRTY[name][s]=DIRTY[name][s]||{};
 DIRTY[name][s][k]=inp.value===""?null:parseFloat(inp.value);
 if(k==="reps")paintCueCard(inp.closest(".card"));
}
// Progression cue fires only when EVERY set hits the top of the range (program rule).
function paintCueCard(card){
 const hi=parseFloat(card.dataset.hi);
 const reps=[...card.querySelectorAll(".setreps")];
 if(card.dataset.kind!=="lift"||!reps.length)return;
 let allHit=true;
 reps.forEach(inp=>{
  const v=parseFloat(inp.value);const hit=!isNaN(v)&&v>=hi;
  inp.classList.toggle("rep-hit",hit);
  if(!hit)allHit=false;
 });
 const cue=card.querySelector(".cue");if(cue)cue.classList.toggle("show",allHit);
}
function saveSession(){
 const day=PROG[CUR];const date=$("#sessdate").value||todayISO();
 const entries=[];
 day.ex.forEach(e=>{
  const name=e[0],nsets=e[1],arr=DIRTY[name];if(!arr)return;
  const sets=[];
  for(let s=0;s<nsets;s++){const d=arr[s];if(d&&(d.wt!=null||d.reps!=null))sets.push({wt:d.wt??null,reps:d.reps??null});}
  if(sets.length)entries.push({name,sets});
 });
 if(!entries.length){toast("Nothing to save yet");return;}
 DATA.sessions.push({date,day:CUR,entries});
 localStorage.removeItem("workout_start");
 persist("Session saved");
}
function persist(okmsg){
 localStorage.setItem(CACHE,JSON.stringify(DATA));
 setSync("syncing…");
 saveDrive().then(()=>{setSync("synced ✓","ok");toast(okmsg+" & synced");DIRTY={};render();})
  .catch(()=>{setSync("saved on device","warn");toast(okmsg+" locally · sync retry next save");});
}

// ─── Module 2: Morning Routine runner ────────────────────────────────────
function saveRun(){if(RUN)localStorage.setItem(RKEY(),JSON.stringify(RUN));else localStorage.removeItem(RKEY());}
function loadRun(){try{const r=JSON.parse(localStorage.getItem(RKEY()));if(r&&r.date===todayISO())return r;}catch(e){}return null;}
function last7Avg(){const log=(RLOG()||[]).slice().sort((a,b)=>a.date.localeCompare(b.date)).slice(-7);
 if(!log.length)return null;return Math.round(log.reduce((s,x)=>s+x.totalSec,0)/log.length);}

function morningView(){
 if(runTab!==CUR){RUN=null;runTab=CUR;}   // switching routine tabs: load that tab's own run
 if(!RUN)RUN=loadRun();
 if(RUN&&RUN.cur<RUN.steps.length)return morningRunningView();
 if(RUN&&RUN.cur>=RUN.steps.length)return morningFinishView();
 return morningStartView();
}
function morningStartView(){
 const steps=RCFG().steps;
 const today=todaySteps();
 const tr=transSec();
 const budget=today.reduce((s,x)=>s+x.targetSec,0)+tr*today.length;
 const avg=last7Avg();
 const when=CUR==="Nighttime"?"Tonight":"Today is "+todayDOW();
 let h=`<div class="daysub">${when} · ${today.length} step${today.length!==1?"s":""} · budget ~${Math.round(budget/60)} min${tr?` <span class="muted">(incl. ${tr}s/step transition)</span>`:""}</div>`;
 const budgetLbl=(CUR==="Nighttime"?"Tonight's":"Today's")+" budget";
 h+=`<div class="kpis">
   <div class="kpi"><div class="v">~${Math.round(budget/60)}m</div><div class="l">${budgetLbl}</div></div>
   <div class="kpi"><div class="v">${avg?fmtSec(avg):"–"}</div><div class="l">Last-7 avg</div></div>
   <div class="kpi"><div class="v">${(RLOG()||[]).length}</div><div class="l">Logged</div></div></div>`;
 if(editMode)return h+editorView(steps);
 h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
   <b style="color:var(--navy)">${CUR==="Nighttime"?"Tonight's":"Today's"} steps</b><button class="restbtn" id="editToggle">Edit steps</button></div>`;
 if(!today.length){h+=`<div class="muted">No steps yet. Tap “Edit steps” to add some.</div>`;}
 today.forEach((s,i)=>{h+=`<div class="mstep"><div><div>${i+1}. ${escapeHtml(s.name)}${s.parallel?' <span class="tagp">parallel</span>':''}${s.cold?' <span class="tagc">cold</span>':''}</div>${s.detail?`<div class="mstep-d">${escapeHtml(s.detail)}</div>`:""}</div><div class="mstep-t">${fmtSec(s.targetSec)}</div></div>`;});
 h+=`</div>`;
 if(today.length)h+=`<div class="card mstart"><button class="btn primary" id="startMorning">Start ${RLABEL()} ▸</button></div>`;
 return h;
}
function editorView(steps){
 let h=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
   <b style="color:var(--navy)">Edit steps</b><button class="restbtn" id="editToggle">Done</button></div>
   <div class="edrow" style="margin:0 0 10px"><label>transition between steps</label>
     <input id="edTrans" type="number" inputmode="numeric" value="${transSec()}" style="width:60px"><span>sec</span></div>`;
 steps.forEach((s,i)=>{
  h+=`<div class="edstep">
    <input class="ed-name" data-i="${i}" value="${escapeAttr(s.name)}" placeholder="step name">
    <div class="edrow">
     <label>min</label><input class="ed-min" type="number" inputmode="decimal" data-i="${i}" value="${+(s.targetSec/60).toFixed(2)}" style="width:62px">
     <label>days</label><input class="ed-days" data-i="${i}" value="${escapeAttr(daysToStr(s.days))}" style="width:130px" placeholder="daily or Mon,Wed">
     <label class="edchk"><input type="checkbox" class="ed-par" data-i="${i}" ${s.parallel?"checked":""}>parallel</label>
    </div>
    <div class="edrow">
     <button class="restbtn ed-up" data-i="${i}">↑</button>
     <button class="restbtn ed-dn" data-i="${i}">↓</button>
     <button class="restbtn ed-del" data-i="${i}" style="color:var(--red)">Delete</button>
    </div></div>`;
 });
 h+=`<div class="addrow" style="margin-top:8px">
   <button class="btn ghost" id="edAdd">+ Add step</button>
   <button class="btn primary" id="edSave" style="flex:0 0 auto">Save steps ▸ sync</button></div></div>`;
 return h;
}
function morningRunningView(){
 const s=RUN.steps[RUN.cur];
 const next=RUN.steps.slice(RUN.cur+1).find(x=>x.status==="pending");
 const totalTarget=RUN.steps.reduce((a,x)=>a+x.targetSec,0)+transSec()*RUN.steps.length;
 let h=`<div class="mclock-card">
   <div class="mclock-top">
     <div><div class="mclock" id="mClock">0:00</div><div class="mclock-sub">of ~${Math.round(totalTarget/60)}m budget</div></div>
     <div class="mpace" id="mPace">on pace</div></div>
   <button class="restbtn" id="endMorning" style="margin-top:10px">End &amp; log ${RLABEL()}</button></div>`;
 h+=`<div class="card mstep-active">
   <div class="exnote">step ${RUN.cur+1} of ${RUN.steps.length}${s.soft?" · wind-down (soft target)":""}</div>
   <div class="mstep-name">${escapeHtml(s.name)}</div>
   <div class="mstep-clock ${s.soft?"soft":""}" id="stepClock">${fmtSigned(s.targetSec)}</div>
   <div class="mstep-target">target ${fmtSec(s.targetSec)}</div>
   ${s.detail?`<div class="mstep-detail">${escapeHtml(s.detail)}</div>`:""}`;
 if(s.cold){
  if(!RUN.cold)h+=`<div class="subtimer"><div class="sub-stages">cleanse → <b>3:00 cold</b> → rinse</div>
    <button class="btn primary sm" id="coldStart">Start 3:00 cold ❄</button></div>`;
  else h+=`<div class="subtimer cold"><div class="sub-stages">❄ cold exposure — <span id="coldStage">${RUN.cold.done?"rinse now":"hold"}</span></div>
    <div class="mstep-clock" id="coldClock">${fmtSec(Math.max(0,Math.round((RUN.cold.endTs-Date.now())/1000)))}</div></div>`;
 }
 h+=`<div class="mbtns">`;
 if(s.parallel)h+=`<button class="btn ghost" id="stepParallel">Start masque sit ▸ continue meanwhile</button>`;
 h+=`<button class="btn ghost sm" id="stepSkip">Skip</button><button class="btn primary" id="stepDone">Done ▸ next</button></div></div>`;
 if(next)h+=`<div class="card mnext"><span class="muted">next:</span> ${escapeHtml(next.name)} · <span class="muted">${fmtSec(next.targetSec)}</span></div>`;
 h+=`<div class="card"><div class="mprog">`;
 RUN.steps.forEach((x,i)=>{const st=x.status;const ic=st==="done"?"✓":st==="skipped"?"–":i===RUN.cur?"▶":"·";
  h+=`<div class="mprogrow ${st}"><span class="mpi">${ic}</span> ${escapeHtml(x.name)}<span class="muted" style="margin-left:auto">${x.actualSec!=null?fmtSec(x.actualSec):fmtSec(x.targetSec)}</span></div>`;});
 h+=`</div></div>`;
 return h;
}
function morningFinishView(){
 const totalSec=Math.round((Date.now()-RUN.startTs)/1000);
 const totalTarget=RUN.steps.reduce((a,x)=>a+x.targetSec,0);
 let h=`<div class="card mstep-active">
   <div class="mstep-name">${RVERB()} complete 🎉</div>
   <div class="mclock" style="color:var(--navy);margin:6px 0">${fmtSec(totalSec)}</div>
   <div class="muted">vs ~${Math.round(totalTarget/60)}m budget</div>
   <div class="mprog" style="margin-top:12px;text-align:left">`;
 RUN.steps.forEach(x=>{h+=`<div class="mprogrow ${x.status}"><span class="mpi">${x.status==="skipped"?"–":"✓"}</span> ${escapeHtml(x.name)}<span class="muted" style="margin-left:auto">${x.actualSec!=null?fmtSec(x.actualSec):"–"}</span></div>`;});
 h+=`</div><button class="btn primary" id="finishLog" style="margin-top:14px;width:100%">Finish &amp; log ▸ sync</button></div>`;
 return h;
}
function startMorning(){
 const steps=todaySteps().map(s=>({id:s.id,name:s.name,targetSec:s.targetSec,parallel:!!s.parallel,
  cold:!!s.cold,coldSec:s.coldSec||180,masqueSec:s.masqueSec||600,soft:!!s.soft,detail:s.detail||"",
  status:"pending",startTs:null,actualSec:null,beeped:false}));
 if(!steps.length){toast("No steps for today");return;}
 RUN={date:todayISO(),startTs:Date.now(),cur:0,steps,bg:[],cold:null};
 steps[0].status="active";steps[0].startTs=Date.now();
 saveRun();render();
}
function finishStep(status){
 if(!RUN)return;const s=RUN.steps[RUN.cur];if(!s)return;
 s.actualSec=Math.round((Date.now()-(s.startTs||Date.now()))/1000);
 s.status=status;RUN.cold=null;advance();
}
function startParallel(){
 if(!RUN)return;const s=RUN.steps[RUN.cur];if(!s)return;
 s.actualSec=Math.round((Date.now()-(s.startTs||Date.now()))/1000);s.status="done";
 RUN.bg.push({name:s.bgName||s.name,endTs:Date.now()+(s.masqueSec||600)*1000,done:false,dismissed:false});
 advance();
}
function startCold(){if(!RUN)return;const s=RUN.steps[RUN.cur];RUN.cold={endTs:Date.now()+(s.coldSec||180)*1000,done:false};saveRun();render();}
function advance(){
 let n=RUN.cur+1;
 while(n<RUN.steps.length&&(RUN.steps[n].status==="done"||RUN.steps[n].status==="skipped"))n++;
 if(n>=RUN.steps.length){RUN.cur=RUN.steps.length;saveRun();render();return;}
 RUN.cur=n;RUN.steps[n].status="active";RUN.steps[n].startTs=Date.now();RUN.steps[n].beeped=false;
 saveRun();render();
}
function endMorningEarly(){
 if(!RUN)return;
 const pending=RUN.steps.filter(s=>s.status==="pending"||s.status==="active").length;
 if(pending&&!confirm("End the "+RLABEL()+" now and log what you've completed? "+pending+" step"+(pending!==1?"s":"")+" still pending."))return;
 finalizeMorning();
}
function finalizeMorning(){
 if(!RUN)return;
 const perStep={};RUN.steps.forEach(s=>{if(s.actualSec!=null)perStep[s.id]=s.actualSec;});
 const totalSec=Math.round((Date.now()-RUN.startTs)/1000);
 setRLOG((RLOG()||[]).filter(e=>e.date!==RUN.date));
 RLOG().push({date:RUN.date,totalSec,perStep});
 RUN=null;saveRun();if(mornInt){clearInterval(mornInt);mornInt=null;}updateWake();
 persist(RVERB()+" logged");
 render(); // ensure we leave the finish view even if the sync is offline (persist only re-renders on success)
}
function morningTick(){
 if(!RUN||RUN.cur>=RUN.steps.length)return;
 const now=Date.now();
 const elapsed=Math.round((now-RUN.startTs)/1000);
 const mc=$("#mClock");if(mc)mc.textContent=fmtSec(elapsed);
 const s=RUN.steps[RUN.cur];
 const sElapsed=Math.round((now-s.startTs)/1000);
 const left=s.targetSec-sElapsed;
 const sc=$("#stepClock");if(sc){sc.textContent=fmtSigned(left);sc.classList.toggle("over",left<0&&!s.soft);}
 if(left<=0&&!s.beeped){s.beeped=true;beep();saveRun();}
 // pace: actual elapsed vs (target + transition allowance) consumed so far
 const tr=transSec();
 let allowed=0;RUN.steps.forEach(x=>{if(x.status==="done"||x.status==="skipped")allowed+=x.targetSec+tr;});
 allowed+=Math.min(sElapsed,s.targetSec);
 const pace=elapsed-allowed;
 const pe=$("#mPace");
 if(pe){if(pace>5){pe.textContent="▼ "+fmtSec(pace)+" behind";pe.className="mpace behind";}
  else if(pace<-5){pe.textContent="▲ "+fmtSec(-pace)+" ahead";pe.className="mpace ahead";}
  else{pe.textContent="on pace";pe.className="mpace";}}
 // cold sub-timer
 if(RUN.cold){const cl=Math.round((RUN.cold.endTs-now)/1000);const ce=$("#coldClock");if(ce)ce.textContent=fmtSec(Math.max(0,cl));
  if(cl<=0&&!RUN.cold.done){RUN.cold.done=true;beep();saveRun();const cg=$("#coldStage");if(cg)cg.textContent="rinse now";}}
 // background (parallel) timers
 let changed=false;RUN.bg.forEach(t=>{if(!t.done&&now>=t.endTs){t.done=true;changed=true;beep();}});
 if(changed)saveRun();
 renderBgChip();
}
function renderBgChip(){
 const el=document.getElementById("bgbar");if(!el)return;
 const live=RUN&&RUN.bg?RUN.bg.filter(t=>!t.dismissed):[];
 if(!live.length){el.classList.remove("show");el.innerHTML="";return;}
 const now=Date.now();el.classList.add("show");
 el.innerHTML=RUN.bg.map((t,i)=>{if(t.dismissed)return"";
   const left=Math.round((t.endTs-now)/1000);
   return `<div class="bgrow ${t.done?"done":""}"><div class="bgc">${t.done?"✓":fmtSec(Math.max(0,left))}</div>
     <div class="bgl">${t.done?escapeHtml(t.name)+" done — rinse":escapeHtml(t.name)}</div>
     <button class="bgx" data-bg="${i}">×</button></div>`;}).join("");
 el.querySelectorAll(".bgx").forEach(b=>b.onclick=()=>{RUN.bg[+b.dataset.bg].dismissed=true;saveRun();renderBgChip();});
}
function bindMorning(){
 if(mornInt){clearInterval(mornInt);mornInt=null;}
 const steps=RCFG().steps;
 const sm=$("#startMorning");if(sm)sm.onclick=startMorning;
 const et=$("#editToggle");if(et)et.onclick=()=>{editMode=!editMode;render();};
 // editor field bindings (update model live; reorder/add/delete re-render)
 document.querySelectorAll(".ed-name").forEach(el=>el.onchange=()=>{steps[+el.dataset.i].name=el.value||"Untitled";});
 document.querySelectorAll(".ed-min").forEach(el=>el.onchange=()=>{const m=parseFloat(el.value);if(!isNaN(m))steps[+el.dataset.i].targetSec=Math.max(5,Math.round(m*60));});
 document.querySelectorAll(".ed-days").forEach(el=>el.onchange=()=>{steps[+el.dataset.i].days=parseDays(el.value);});
 document.querySelectorAll(".ed-par").forEach(el=>el.onchange=()=>{steps[+el.dataset.i].parallel=el.checked;});
 document.querySelectorAll(".ed-up").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;if(i>0){const t=steps[i-1];steps[i-1]=steps[i];steps[i]=t;render();}});
 document.querySelectorAll(".ed-dn").forEach(b=>b.onclick=()=>{const i=+b.dataset.i;if(i<steps.length-1){const t=steps[i+1];steps[i+1]=steps[i];steps[i]=t;render();}});
 document.querySelectorAll(".ed-del").forEach(b=>b.onclick=()=>{steps.splice(+b.dataset.i,1);render();});
 const tr=$("#edTrans");if(tr)tr.onchange=()=>{const v=parseInt(tr.value,10);if(!isNaN(v))RCFG().transitionSec=Math.max(0,v);};
 const ea=$("#edAdd");if(ea)ea.onclick=()=>{steps.push({id:"s"+Date.now(),name:"New step",targetSec:300,days:"daily"});render();};
 const es=$("#edSave");if(es)es.onclick=()=>persist("Steps saved");
 // runner bindings
 const db=$("#stepDone");if(db)db.onclick=()=>finishStep("done");
 const kb=$("#stepSkip");if(kb)kb.onclick=()=>finishStep("skipped");
 const pb=$("#stepParallel");if(pb)pb.onclick=startParallel;
 const cb=$("#coldStart");if(cb)cb.onclick=startCold;
 const em=$("#endMorning");if(em)em.onclick=endMorningEarly;
 const fl=$("#finishLog");if(fl)fl.onclick=finalizeMorning;
 renderBgChip();
 if(RUN&&RUN.cur<RUN.steps.length){maybeAskNotif();morningTick();mornInt=setInterval(morningTick,250);}
 updateWake();
}
